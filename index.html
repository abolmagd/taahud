<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تعاهُد — تسجيل التسميع</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="app-header">
      <img src="assets/logo.png" alt="تعاهُد" class="app-logo" />
      <h1 class="brand-word">تعاهُد</h1>
      <p class="muted">سجّل ما تم تسميعه أو الاستماع إليه</p>
    </header>

    <main class="card login-screen" id="student-login-card">
      <form id="student-login-form" novalidate>
        <div class="form-group">
          <label for="login-code">الكود الخاص بك</label>
          <input type="text" id="login-code" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="login-password">كلمة المرور</label>
          <input type="password" id="login-password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary" id="student-login-btn">دخول</button>
      </form>
      <div id="login-toast" class="toast" hidden></div>
    </main>

    <section class="card login-screen" id="force-password-card" hidden>
      <h2>تغيير كلمة المرور</h2>
      <form id="force-password-form" novalidate>
        <div class="form-group">
          <label for="new-student-password">كلمة المرور الجديدة</label>
          <input type="password" id="new-student-password" autocomplete="new-password" minlength="6" required />
        </div>
        <div class="form-group">
          <label for="confirm-student-password">تأكيد كلمة المرور</label>
          <input type="password" id="confirm-student-password" autocomplete="new-password" minlength="6" required />
        </div>
        <button type="submit" class="btn btn-primary" id="force-password-btn">حفظ ودخول</button>
      </form>
      <div id="password-toast" class="toast" hidden></div>
    </section>

    <main id="student-dashboard" hidden>
      <section class="student-dashboard-head">
        <div>
          <p class="muted">مرحبًا</p>
          <h2 id="student-dashboard-title"></h2>
        </div>
        <button type="button" class="btn btn-secondary" id="student-logout-btn">خروج</button>
      </section>

      <section class="stat-tiles student-stat-tiles">
        <div class="stat-tile">
          <span class="stat-tile-value" id="student-total-points">0</span>
          <span class="stat-tile-label">النقاط</span>
        </div>
        <div class="stat-tile">
          <span class="stat-tile-value" id="student-current-streak">0</span>
          <span class="stat-tile-label">الستريك</span>
        </div>
        <div class="stat-tile">
          <span class="stat-tile-value" id="student-total-pages">0</span>
          <span class="stat-tile-label">الصفحات</span>
        </div>
        <div class="stat-tile">
          <span class="stat-tile-value" id="student-total-sessions">0</span>
          <span class="stat-tile-label">الجلسات</span>
        </div>
      </section>

      <section class="card" id="checkin-card">
        <h2>تسجيل جلسة</h2>
        <form id="checkin-form" novalidate>

        <div class="form-group">
          <label for="listener-code">كود الحافظ الذي سمعت عليه</label>
          <div class="code-search-quick-options">
            <button type="button" class="chip" data-quick-value="__outside__">شخص آخر خارج <span class="brand-text">تعاهُد</span></button>
            <button type="button" class="chip" data-quick-value="__listening_only__">وِرد استماع</button>
          </div>
          <select id="listener-code" required>
            <option value="">اختر الكود...</option>
          </select>
        </div>

        <div class="form-group">
          <label for="session-timing">وقت التسميع</label>
          <select id="session-timing" required>
            <option value="today">اليوم</option>
            <option value="previous">يوم سابق</option>
          </select>
        </div>

        <div class="form-group" id="session-date-group" hidden>
          <label for="session-date">تاريخ اليوم السابق</label>
          <input type="date" id="session-date" />
        </div>

        <div class="form-group">
          <label for="pages">عدد الصفحات</label>
          <input type="number" id="pages" min="0" step="0.5" required />
        </div>

        <div class="form-group">
          <label for="surah-range">من (اختياري)</label>
          <input type="text" id="surah-range" placeholder="مثال: النساء ٣٣ - ٥٩" />
        </div>

        <div class="form-group">
          <label for="method">طريقة التسميع؟</label>
          <select id="method" required>
            <option value="">اختر...</option>
            <option value="تليجرام">تليجرام</option>
            <option value="واتس">واتس</option>
            <option value="مكالمة هاتفية">مكالمة هاتفية</option>
            <option value="جوجل ميت">جوجل ميت</option>
            <option value="مقابلة">مقابلة</option>
            <option value="استماع">استماع</option>
            <option value="أخرى">أخرى</option>
          </select>
        </div>

        <div class="form-group">
          <label for="satisfaction">هل أنت راض عن جودة محفوظك الذي سمعته؟</label>
          <select id="satisfaction" required>
            <option value="">اختر...</option>
            <option value="نعم تماما">نعم تماما</option>
            <option value="يحتاج إلى مزيد من الضبط">يحتاج إلى مزيد من الضبط</option>
            <option value="وردي كان ورد استماع">وردي كان ورد استماع</option>
          </select>
        </div>

        <div class="form-group">
          <label for="notes">ملاحظات واقتراحات (اختياري)</label>
          <textarea id="notes" rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">تسجيل</button>
      </form>
      <div id="toast" class="toast" hidden></div>
      </section>

      <section class="card">
        <div class="section-heading">
          <h2>الهيستوري</h2>
          <p class="muted" id="student-history-summary">0 جلسة</p>
        </div>
        <div class="table-wrap">
          <table class="table student-history-table">
            <thead>
              <tr>
                <th>التاريخ</th>
                <th>الدور</th>
                <th>الطرف الآخر</th>
                <th>الصفحات</th>
                <th>الطريقة</th>
                <th>النقاط</th>
              </tr>
            </thead>
            <tbody id="student-history-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="supabase-config.js" defer></script>
  <script src="points.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
